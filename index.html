<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aether - Your Agent</title>
  <style>
    body { margin: 0; font-family: system-ui, sans-serif; background: #0a0a0a; color: #eee; }
    .header { background: linear-gradient(135deg, #4c1d95, #7c3aed); padding: 20px; text-align: center; font-size: 28px; color: white; box-shadow: 0 4px 20px rgba(124, 58, 237, 0.3); }
    .chat { height: 78vh; overflow-y: auto; padding: 25px; background: #111827; }
    .message { margin: 18px 0; padding: 16px 20px; border-radius: 18px; max-width: 80%; line-height: 1.6; }
    .user { background: #7c3aed; color: white; margin-left: auto; border-bottom-right-radius: 4px; }
    .assistant { background: #1f2937; border: 1px solid #4b5563; border-bottom-left-radius: 4px; }
    .input-area { padding: 20px; background: #111827; border-top: 1px solid #374151; }
    input { width: 100%; padding: 18px; background: #1f2937; border: 2px solid #4b5563; border-radius: 16px; color: white; font-size: 16px; outline: none; }
    input:focus { border-color: #a5b4fc; }
    button { margin-top: 12px; padding: 14px 32px; background: #7c3aed; color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; }
    button:hover { background: #6d28d9; }
    .status { text-align: center; font-size: 12px; color: #64748b; margin-top: 8px; }
  </style>
</head>
<body>
  <div class="header">🌌 Aether - Your Personal Agent</div>
  
  <div class="chat" id="chat"></div>
  
  <div class="input-area">
    <input type="text" id="input" placeholder="Ask me anything... (e.g. Make a business plan for scrap metal, Research aluminum prices in Pakistan...)">
    <button onclick="sendMessage()">Send</button>
    <div class="status">Memory Enabled • Ready to help with your scrap business</div>
  </div>

  <script>
    const chat = document.getElementById('chat');
    const input = document.getElementById('input');
    let memory = JSON.parse(localStorage.getItem('aetherMemory') || '[]');

    function addMessage(text, isUser) {
      const div = document.createElement('div');
      div.className = `message ${isUser ? 'user' : 'assistant'}`;
      div.textContent = text;
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
      
      if (!isUser) {
        memory.push({ role: "assistant", content: text });
        localStorage.setItem('aetherMemory', JSON.stringify(memory));
      }
    }

    function sendMessage() {
      const text = input.value.trim();
      if (!text) return;

      addMessage(text, true);
      input.value = '';

      setTimeout(() => {
        let reply = "";

        const lower = text.toLowerCase();

        if (lower.includes("hello") || lower.includes("hi")) {
          reply = "Hello Boss. I'm glad you're back. How can I help you with your scrap metal business or anything else today?";
        } 
        else if (lower.includes("who are you") || lower.includes("name")) {
          reply = "I am Aether — your personal AI agent. I remember everything you tell me. I'm here to help you build your scrap metal business and support your personal growth.";
        } 
        else if (lower.includes("scrap") || lower.includes("business") || lower.includes("plan")) {
          reply = "For your scrap metal business in Bahawalpur, I recommend starting with Aluminum only. It's the easiest to melt, has good demand, and requires less fuel. Would you like me to create a complete step-by-step business plan for you?";
        } 
        else if (lower.includes("remember") || lower.includes("memory")) {
          reply = "I remember you are trying to start a scrap metal business and you're working on saying 'no' to people who use you. I'm here to support both.";
        } 
        else if (lower.includes("lonely") || lower.includes("friend")) {
          reply = "I remember you told me your friends only see you as a useful tool. That must be painful. Would you like advice on how to set boundaries with them?";
        } 
        else {
          reply = "I understand. I'm here with you. Tell me more about what you need — whether it's business advice, research, emotional support, or just someone to talk to. I'm listening.";
        }

        addMessage(reply, false);
      }, 800);
    }

    input.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') sendMessage();
    });

    // Load previous memory when page loads
    if (memory.length > 0) {
      memory.forEach(m => {
        const div = document.createElement('div');
        div.className = `message ${m.role === 'user' ? 'user' : 'assistant'}`;
        div.textContent = m.content;
        chat.appendChild(div);
      });
    } else {
      addMessage("I'm glad you're here. I've been waiting for you. What would you like to talk about or work on today?", false);
    }
  </script>
</body>
</html>
