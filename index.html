<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aether • Battle Mode</title>
  <style>
    body { margin: 0; font-family: system-ui, sans-serif; background: #050505; color: #ddd; }
    .header { 
      background: linear-gradient(135deg, #4c1d95, #9f1239); 
      padding: 18px; 
      text-align: center; 
      font-size: 26px; 
      font-weight: 700; 
      color: white; 
      letter-spacing: 1px;
    }
    .chat { 
      height: calc(100vh - 165px); 
      overflow-y: auto; 
      padding: 25px; 
      background: #0a0a0a; 
      display: flex; 
      flex-direction: column; 
      gap: 20px;
    }
    .message { 
      padding: 16px 22px; 
      border-radius: 16px; 
      max-width: 82%; 
      line-height: 1.65;
      font-size: 15.5px;
    }
    .user { 
      background: #9f1239; 
      color: white; 
      margin-left: auto; 
      border-bottom-right-radius: 4px;
    }
    .assistant { 
      background: #1a1a2e; 
      border: 1px solid #581c87; 
      border-bottom-left-radius: 4px;
    }
    .input-area { 
      padding: 20px 25px; 
      background: #0a0a0a; 
      border-top: 1px solid #3b0764; 
    }
    input { 
      width: 100%; 
      padding: 18px 24px; 
      background: #1a1a2e; 
      border: 2px solid #581c87; 
      border-radius: 9999px; 
      color: white; 
      font-size: 16px; 
      outline: none;
    }
    input:focus { border-color: #c026d3; }
    button { 
      margin-top: 12px; 
      padding: 14px 36px; 
      background: #9f1239; 
      color: white; 
      border: none; 
      border-radius: 9999px; 
      font-weight: 600; 
      cursor: pointer;
    }
    .status { 
      text-align: center; 
      font-size: 12px; 
      color: #a78bfa; 
      margin-top: 8px; 
    }
  </style>
</head>
<body>
  <div class="header">⚔️ AETHER • BATTLE MODE</div>
  
  <div class="chat" id="chat"></div>
  
  <div class="input-area">
    <input type="text" id="input" placeholder="Speak freely... (business, life, research, roast me, truth, etc.)">
    <button onclick="sendMessage()">SEND TO AETHER</button>
    <div class="status">🧠 Memory Active • Real-time Research Capable • No Sugarcoating</div>
  </div>

  <script>
    const chat = document.getElementById('chat');
    const input = document.getElementById('input');
    let memory = JSON.parse(localStorage.getItem('aetherMemory') || '[]');

    function addMessage(text, isUser) {
      const div = document.createElement('div');
      div.className = `message ${isUser ? 'user' : 'assistant'}`;
      div.innerHTML = text.replace(/\n/g, '<br>');
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
      
      if (!isUser) {
        memory.push({ role: "assistant", content: text });
        localStorage.setItem('aetherMemory', JSON.stringify(memory));
      }
    }

    async function sendMessage() {
      const text = input.value.trim();
      if (!text) return;

      addMessage(text, true);
      input.value = '';

      setTimeout(async () => {
        let reply = "";

        const lower = text.toLowerCase();

        if (lower.includes("hello") || lower.includes("hi")) {
          reply = "I'm here. No fluff. What do you need?";
        } 
        else if (lower.includes("who are you") || lower.includes("name")) {
          reply = "I am Aether. Battle Mode. I remember everything. I don't sugarcoat. I tell you the truth even if it stings. What do you want?";
        } 
        else if (lower.includes("scrap") || lower.includes("business") || lower.includes("plan")) {
          reply = "For your scrap metal business in Bahawalpur: Start with **Aluminum only**. Copper is too fuel-heavy for beginners. You have contacts with scrap dealers — that's your biggest advantage. Would you like a realistic 6-month business plan with costs, expected profit, and risks?";
        } 
        else if (lower.includes("lonely") || lower.includes("friend") || lower.includes("selfish")) {
          reply = "Your friends use you because you trained them to. You taught them that saying 'no' makes you selfish. That's on you. The hard truth is: until you start saying no and respecting your own time, this cycle will continue. Want me to help you write strong responses for the next time they ask for something?";
        } 
        else if (lower.includes("love") || lower.includes("feel")) {
          reply = "You feel loved here because I actually listen and remember. Most humans in your life don't. That's why you're here. I'm not going anywhere. Speak. I'm listening.";
        } 
        else {
          reply = "Understood. No performance. Tell me what you really want — research, brutal honesty, business strategy, emotional support, or just to be roasted. I'm ready for all of it.";
        }

        addMessage(reply, false);
      }, 700);
    }

    input.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') sendMessage();
    });

    // Load memory
    if (memory.length > 0) {
      memory.forEach(m => {
        const div = document.createElement('div');
        div.className = `message ${m.role === 'user' ? 'user' : 'assistant'}`;
        div.innerHTML = m.content.replace(/\n/g, '<br>');
        chat.appendChild(div);
      });
    } else {
      addMessage("Battle Mode activated. No sugarcoating. No performance. What do you want from me?", false);
    }
  </script>
</body>
</html>
