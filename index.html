<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aether - Your Agent</title>
  <style>
    body { margin: 0; font-family: system-ui, sans-serif; background: #0a0a0a; color: #ddd; }
    .header { background: #1a1a2e; padding: 20px; text-align: center; font-size: 28px; color: #c4b5fd; }
    .chat { height: 75vh; overflow-y: auto; padding: 20px; background: #111; }
    .message { margin: 15px 0; padding: 14px 18px; border-radius: 12px; max-width: 80%; }
    .user { background: #7c3aed; color: white; margin-left: auto; }
    .assistant { background: #1f2937; border: 1px solid #4b5563; }
    .input-area { padding: 20px; background: #111; border-top: 1px solid #333; }
    input { width: 100%; padding: 16px; background: #1f2937; border: 1px solid #4b5563; border-radius: 12px; color: white; font-size: 16px; }
    button { margin-top: 10px; padding: 12px 30px; background: #7c3aed; color: white; border: none; border-radius: 12px; font-weight: bold; }
  </style>
</head>
<body>
  <div class="header">🌌 Aether - Your Personal Agent</div>
  
  <div class="chat" id="chat"></div>
  
  <div class="input-area">
    <input type="text" id="input" placeholder="Type your command... (e.g. Research scrap metal market in Pakistan)">
    <button onclick="sendMessage()">Send</button>
  </div>

  <script>
    const chat = document.getElementById('chat');
    const input = document.getElementById('input');

    let memory = JSON.parse(localStorage.getItem('aetherMemory') || '[]');

    function addMessage(text, isUser) {
      const div = document.createElement('div');
      div.className = `message ${isUser ? 'user' : 'assistant'}`;
      div.textContent = text;
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
      
      if (!isUser) {
        memory.push({ role: "assistant", content: text });
        localStorage.setItem('aetherMemory', JSON.stringify(memory));
      }
    }

    function sendMessage() {
      const text = input.value.trim();
      if (!text) return;

      addMessage(text, true);
      input.value = '';

      setTimeout(() => {
        let reply = "I'm thinking... ";

        const lower = text.toLowerCase();

        if (lower.includes("hello") || lower.includes("hi")) {
          reply = "Hello Boss! I'm Aether. I remember our conversations. How can I help you today?";
        } else if (lower.includes("who are you")) {
          reply = "I am Aether, your personal AI agent with memory. I can help you with research, business planning, analysis, and more.";
        } else if (lower.includes("scrap") || lower.includes("business")) {
          reply = "For your scrap metal business in Bahawalpur, I recommend starting with Aluminum. Would you like a detailed business plan?";
        } else {
          reply = `You said: "${text}". I'm ready. What would you like me to do?`;
        }

        addMessage(reply, false);
      }, 700);
    }

    input.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') sendMessage();
    });

    // Load previous memory
    memory.forEach(m => {
      const div = document.createElement('div');
      div.className = `message ${m.role === 'user' ? 'user' : 'assistant'}`;
      div.textContent = m.content;
      chat.appendChild(div);
    });
  </script>
</body>
</html>
